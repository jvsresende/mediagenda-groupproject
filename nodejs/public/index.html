<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta 
      name="viewport" 
      content="width=device-width, 
        initial-scale=1.0">
    <meta 
      http-equiv="X-UA-Compatible" 
      content="ie=edge">
    <title>MediAgenda NodeJS</title>
    <link rel="stylesheet" 
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- font awesome-->
    <link rel="stylesheet"
     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <!-- menu -->
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fa-solid fa-stethoscope me-2"></i>
                MediAgenda NodeJS
            </span>
            <button class="btn btn-light ms-auto"
              onclick="mostrarSobre()">
                <i class="fa-solid fa-circle-info"></i>
                Sobre
            </button>
            <button class="btn btn-light ms-2" onclick="abrirNovoAgendamento()"
                data-bs-toggle="modal" 
                data-bs-target="#modalAgendamento">
                    <i class="fa-solid fa-plus me-2"></i>
                    Novo Agendamento
            </button>
        </div>
    </nav>
    <div class="container mt-4">
        <!-- status -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4>
                    <i class="fa-solid fa-heart-pulse text-danger me-2"></i>
                    Status do Sistema
                </h4>
                <p id="statusSistema">Carregando...</p>
            </div>
        </div>
        <!-- consultas -->
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fa-solid fa-calendar-check me-2 text-primary"></i>
                    Consultas Agendadas
                </h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thread class="table-primary">
                            <tr>
                                <th>Paciente</th>
                                <th>Médico</th>
                                <th>Especialidade</th>
                                <th>Data</th>
                                <th>Horário</th>
                                <th>Status</th>
                            </tr>
                        </thread>
                        <tbody id="tabelaConsultas"></tbody>
                    </table>        
                </div>
            </div>
        </div>
    </div>

    <!-- modal agendamento -->
    <div class="modal fade" id="modalAgendamento" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="tituloModal">Novo Agendamento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="agendamentoId">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Paciente</label>
                            <input type="text" id="paciente" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Médico</label>
                            <select id="medico_id" class="form-select">
                                <option value="">Selecione</option>
                                <option value="1">Dr. Carlos Lima</option>
                                <option value="2">Dra. Ana Paula</option>
                                <option value="3">Dr. Pedro Alves</option>
                                <option value="4">Dra. Marina Reis</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Especialidade</label>
                            <select id="especialidade_id" class="form-select">
                                <option value="">Selecione</option>
                                <option value="1">Cardiologia</option>
                                <option value="2">Dermatologia</option>
                                <option value="3">Ortopedia</option>
                                <option value="4">Pediatria</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Data</label>
                            <input type="date" id="data" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Horário</label>
                            <input type="time" id="horario" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select id="status" class="form-select">
                                <option value="Confirmado">Confirmado</option>
                                <option value="Pendente">Pendente</option>
                                <option value="Cancelado">Cancelado</option>
                            </select>
                        </div>

                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button class="btn btn-success" onclick="salvarAgendamento()">
                        Salvar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- bootstrap js-->
    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="script.js"></script>
</body>
</html>
